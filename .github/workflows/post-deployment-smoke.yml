name: Production API smoke

on:
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read
  deployments: read

concurrency:
  group: production-api-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'production'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify public API after deployment
        run: npm run smoke:api
        env:
          API_BASE: https://www.kebiao.org
          SMOKE_EXPECTED_RELEVANCE_VERSION: topic-evidence-v1
          SMOKE_READINESS_ATTEMPTS: 15
          SMOKE_READINESS_INTERVAL_MS: 10000
