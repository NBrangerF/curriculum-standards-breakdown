openapi: 3.1.0
info:
  title: 课程智能 API
  version: 0.2.0
  description: 面向课程标准检索、能力图谱、教学规划解析、标准匹配和覆盖分析的课程智能 API。
servers:
  - url: https://curriculum-standards-breakdown.vercel.app
    description: 生产环境
  - url: http://localhost:8787
    description: 本地开发
tags:
  - name: 元信息
    description: 健康检查、OpenAPI 文档、服务元信息、数据版本和运维指标。
  - name: 学科
    description: 学科列表、学科详情，以及学科内领域和子领域结构。
  - name: 能力
    description: 跨学科可迁移能力及其关联课程标准。
  - name: 课程标准
    description: 课程标准检索、批量读取、详情查询和标准对比。
  - name: 关系图谱
    description: 标准进阶、前后关系、同领域、同能力和证据摘要。
  - name: 教学规划
    description: 教学计划解析、校验、标准匹配、覆盖分析和周进度生成。
security:
  - ApiKeyAuth: []
  - {}
paths:
  /api/v1/health:
    get:
      tags: [元信息]
      summary: 获取服务健康状态和当前数据版本
      responses:
        "200":
          description: 服务健康状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/v1/openapi.yaml:
    get:
      tags: [元信息]
      summary: 获取当前 OpenAPI YAML 文档
      responses:
        "200":
          description: OpenAPI YAML 文档
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/docs:
    get:
      tags: [元信息]
      summary: 打开中文 API 文档界面
      responses:
        "200":
          description: 中文 API 文档 HTML 页面
          content:
            text/html:
              schema:
                type: string
  /api/v1/metrics:
    get:
      tags: [元信息]
      summary: 获取 API 运行指标快照
      description: 需要 admin 权限 API key。当前支持内存指标，并可在 Node 文件部署下追加写入持久化 NDJSON。
      responses:
        "200":
          description: 指标快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/meta:
    get:
      tags: [元信息]
      summary: 获取 API 元信息和可用筛选项
      responses:
        "200":
          description: API 元信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/data-version:
    get:
      tags: [元信息]
      summary: 获取稳定的数据版本契约
      responses:
        "200":
          description: 数据版本
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DataVersion"
  /api/v1/subjects:
    get:
      tags: [学科]
      summary: 列出学科、元数据和统计信息
      responses:
        "200":
          description: 学科列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/v1/subjects/{subject_slug}:
    get:
      tags: [学科]
      summary: 获取单个学科详情
      parameters:
        - $ref: "#/components/parameters/SubjectSlug"
      responses:
        "200":
          description: 学科详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/subjects/{subject_slug}/domains:
    get:
      tags: [学科, 关系图谱]
      summary: 获取某个学科的领域和子领域结构
      parameters:
        - $ref: "#/components/parameters/SubjectSlug"
      responses:
        "200":
          description: 学科领域结构
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/skills:
    get:
      tags: [能力]
      summary: 列出可迁移能力元数据
      responses:
        "200":
          description: 能力元数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/v1/skills/{skill_code}:
    get:
      tags: [能力]
      summary: 获取单个可迁移能力详情
      parameters:
        - $ref: "#/components/parameters/SkillCode"
      responses:
        "200":
          description: 能力详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/skills/{skill_code}/standards:
    get:
      tags: [能力, 课程标准, 关系图谱]
      summary: 列出与某个可迁移能力对齐的课程标准
      parameters:
        - $ref: "#/components/parameters/SkillCode"
        - $ref: "#/components/parameters/Include"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: 能力关联的课程标准列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardCollectionResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/standards/{code}:
    get:
      tags: [课程标准]
      summary: 按 code 获取单条课程标准
      parameters:
        - $ref: "#/components/parameters/StandardCode"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: 课程标准详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StandardPublic"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/standards/{code}/progression:
    get:
      tags: [课程标准, 关系图谱]
      summary: 获取某条标准所在的进阶组
      parameters:
        - $ref: "#/components/parameters/StandardCode"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: 进阶组
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/standards/{code}/neighbors:
    get:
      tags: [关系图谱]
      summary: 获取前后、同领域、同能力和进阶相邻标准
      parameters:
        - $ref: "#/components/parameters/StandardCode"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: 标准邻接关系
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StandardNeighbors"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/standards/{code}/evidence:
    get:
      tags: [关系图谱]
      summary: 获取某条标准的来源和证据摘要
      parameters:
        - $ref: "#/components/parameters/StandardCode"
      responses:
        "200":
          description: 证据摘要
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StandardEvidenceSummary"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/standards/search:
    post:
      tags: [课程标准]
      summary: 搜索课程标准
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardSearchRequest"
      responses:
        "200":
          description: 搜索结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardCollectionResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/standards/batch:
    post:
      tags: [课程标准]
      summary: 按 code 批量获取课程标准
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardBatchRequest"
      responses:
        "200":
          description: 批量查询结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardCollectionResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/standards/compare:
    post:
      tags: [课程标准, 关系图谱]
      summary: 对比 2 到 10 条课程标准
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardCompareRequest"
      responses:
        "200":
          description: 标准对比结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/plans/parse:
    post:
      tags: [教学规划]
      summary: 将结构化或纯文本教学计划解析为 ParsedPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanParseRequest"
      responses:
        "200":
          description: 解析后的教学计划和提示信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/plans/validate:
    post:
      tags: [教学规划]
      summary: 校验 ParsedPlan 的学科、年级段和单元结构
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  $ref: "#/components/schemas/ParsedPlan"
      responses:
        "200":
          description: 校验结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/matching/plan-to-standards:
    post:
      tags: [教学规划]
      summary: 将教学计划单元匹配到真实课程标准，并返回分数和理由
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanToStandardsRequest"
      responses:
        "200":
          description: 可解释的匹配结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlanMatchingResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/coverage/analyze:
    post:
      tags: [教学规划]
      summary: 分析教学计划对课程标准的覆盖情况
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoverageAnalyzeRequest"
      responses:
        "200":
          description: 覆盖分析结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/schedules/weekly:
    post:
      tags: [教学规划]
      summary: 根据教学计划和标准匹配结果生成确定性的周进度安排
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyScheduleRequest"
      responses:
        "200":
          description: 周进度安排
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: 可选 API key。未提供 key 时按 anonymous 权限层级处理，只能访问 public 字段集。
  parameters:
    SubjectSlug:
      name: subject_slug
      in: path
      required: true
      description: 学科 slug，例如 science。
      schema:
        type: string
        example: science
    SkillCode:
      name: skill_code
      in: path
      required: true
      description: 可迁移能力 code，例如 TS1。
      schema:
        type: string
        example: TS1
    StandardCode:
      name: code
      in: path
      required: true
      description: 课程标准 code，例如 SC-D2-SC-010。
      schema:
        type: string
        example: SC-D2-SC-010
    Include:
      name: include
      in: query
      required: false
      description: 逗号分隔的字段集。默认 public。source/evidence 需要 developer 权限层级，textbook 需要 partner 权限层级，admin 需要 admin 权限层级。
      schema:
        type: string
        example: public,evidence
    Limit:
      name: limit
      in: query
      required: false
      description: 每页返回数量，范围 1 到 100。
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      description: 分页游标，来自上一页响应的 meta.next_cursor。
      schema:
        type: string
  responses:
    Forbidden:
      description: 当前字段集或接口需要更高权限层级
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    TooManyRequests:
      description: 超出当前 tier 的限流
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ValidationError:
      description: 请求参数或请求体校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    Fieldset:
      title: 权限字段集
      description: 控制标准详情返回范围的字段集。高敏感来源、证据、教材和 admin 字段需要更高权限。
      type: string
      enum: [public, source, evidence, textbook, admin]
    ApiMeta:
      title: API 响应元信息
      description: 每次成功响应都会返回的请求追踪、数据版本和提示信息。
      type: object
      properties:
        request_id:
          description: 服务端生成的请求追踪 ID。
          type: string
        data_version:
          description: 当前使用的数据版本。
          type: string
          example: "2026.07.09"
        schema_version:
          description: 当前 API 数据结构版本。
          type: string
          example: "1.0.0"
        warnings:
          description: 非阻断提示，例如解析不完整或需要人工复核。
          type: array
          items:
            type: string
      required: [request_id, data_version, schema_version, warnings]
    ApiResponse:
      title: 成功响应
      description: API 成功响应统一封装格式。
      type: object
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/ApiMeta"
      required: [data, meta]
    ApiError:
      title: 错误响应
      description: API 错误响应统一封装格式。
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items: {}
          required: [code, message, details]
        meta:
          type: object
          properties:
            request_id:
              type: string
          required: [request_id]
      required: [error, meta]
    DataVersion:
      title: 数据版本
      description: 当前数据集、结构、来源和校验状态。
      type: object
      properties:
        data_version:
          type: string
        schema_version:
          type: string
        source_standard:
          type: string
        source_commit:
          type: string
        generated_at:
          type: string
        data_source_generated_at:
          type: string
        validated:
          type: boolean
        subjects_covered:
          type: integer
        standard_count:
          type: integer
      required: [data_version, schema_version, validated, subjects_covered, standard_count]
    StandardPublic:
      title: 课程标准公开字段
      description: public 字段集下可匿名访问的课程标准字段。
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        subject:
          type: string
        subject_slug:
          type: string
        domain:
          type: string
        subdomain:
          type: string
        display_subcategory:
          type: string
        standard_title:
          type: string
        grade_band:
          type: string
        grade_range:
          type: string
        grade:
          type: string
        grade_level:
          type: [integer, "null"]
        stage_band:
          type: string
        standard:
          type: string
        context:
          type: string
        practice:
          type: string
        teaching_tip:
          type: string
        assessment_evidence_type:
          type: string
        ts_primary:
          type: array
          items:
            type: string
        ts_secondary:
          type: array
          items:
            type: string
        ts_rationale:
          type: string
      required: [id, code, subject, subject_slug, grade_band, standard]
    StandardSearchRequest:
      title: 标准搜索请求
      description: 按学科、年级段、领域、能力或关键词搜索课程标准。
      type: object
      properties:
        subjects:
          type: array
          items:
            type: string
        grade_bands:
          type: array
          items:
            type: string
        domains:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        keyword:
          type: string
        include:
          type: array
          items:
            $ref: "#/components/schemas/Fieldset"
        limit:
          type: integer
          minimum: 1
          maximum: 100
        cursor:
          type: [string, "null"]
    StandardBatchRequest:
      title: 批量标准请求
      description: 通过多个标准 code 批量获取课程标准。
      type: object
      properties:
        codes:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
        include:
          type: array
          items:
            $ref: "#/components/schemas/Fieldset"
      required: [codes]
    StandardCompareRequest:
      title: 标准对比请求
      description: 对比 2 到 10 条课程标准的相同点、差异点和进阶关系。
      type: object
      properties:
        codes:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: string
        include:
          type: array
          items:
            $ref: "#/components/schemas/Fieldset"
      required: [codes]
    StandardCollectionResponse:
      title: 标准列表响应
      description: 带分页元信息的课程标准列表响应。
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/StandardPublic"
            meta:
              allOf:
                - $ref: "#/components/schemas/ApiMeta"
                - type: object
                  properties:
                    total:
                      type: integer
                    limit:
                      type: integer
                    next_cursor:
                      type: [string, "null"]
    StandardNeighbors:
      title: 标准邻接关系
      description: 某条标准的前后标准、同领域标准、同能力标准和进阶关系。
      type: object
      properties:
        anchor:
          $ref: "#/components/schemas/StandardPublic"
        relationships:
          type: object
          properties:
            previous:
              anyOf:
                - $ref: "#/components/schemas/StandardPublic"
                - type: "null"
            next:
              anyOf:
                - $ref: "#/components/schemas/StandardPublic"
                - type: "null"
            same_domain:
              $ref: "#/components/schemas/RelatedStandards"
            same_skill:
              type: object
              properties:
                skills:
                  type: array
                  items:
                    type: string
                total:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/StandardPublic"
            progression:
              type: object
              properties:
                progression_group_id:
                  type: [string, "null"]
                total:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/StandardPublic"
    RelatedStandards:
      title: 相关标准集合
      description: 相关课程标准列表及数量。
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/StandardPublic"
    StandardEvidenceSummary:
      title: 标准证据摘要
      description: 某条课程标准的来源、证据数量和 evidence id 摘要。
      type: object
      properties:
        code:
          type: string
        subject_slug:
          type: string
        grade_band:
          type: string
        evidence_ids:
          type: object
          properties:
            textbook:
              type: array
              items:
                type: string
            textbook_unit:
              type: array
              items:
                type: string
            supplemental:
              type: array
              items:
                type: string
        evidence_counts:
          type: object
          properties:
            textbook:
              type: integer
            textbook_unit:
              type: integer
            supplemental:
              type: integer
        source:
          type: object
        progression:
          type: object
        warnings:
          type: array
          items:
            type: string
    PlanUnit:
      title: 教学单元
      description: 教学计划中的一个单元，包含标题、周次、课时、学习目标和关键词。
      type: object
      properties:
        unit_id:
          type: string
        title:
          type: string
        week_start:
          type: integer
        week_end:
          type: integer
        lesson_count:
          type: integer
        learning_goals:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
      required: [title]
    ParsedPlan:
      title: 解析后的教学计划
      description: 结构化教学计划，用于校验、标准匹配、覆盖分析和周进度生成。
      type: object
      properties:
        plan_id:
          type: string
        title:
          type: string
        subject_slug:
          type: string
        grade:
          type: string
        grade_band:
          type: string
        duration_weeks:
          type: integer
        lessons_per_week:
          type: integer
        units:
          type: array
          items:
            $ref: "#/components/schemas/PlanUnit"
      required: [title]
    PlanParseRequest:
      title: 计划解析请求
      description: 传入纯文本计划或已结构化 plan，返回规范化 ParsedPlan。
      type: object
      properties:
        text:
          type: string
        plan:
          $ref: "#/components/schemas/ParsedPlan"
      anyOf:
        - required: [text]
        - required: [plan]
    PlanToStandardsRequest:
      title: 计划匹配标准请求
      description: 将教学计划中的单元匹配到真实课程标准，并控制返回数量、最低分和复核阈值。
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/ParsedPlan"
        top_k_per_unit:
          type: integer
          minimum: 1
          maximum: 20
        min_score:
          type: number
          minimum: 0
          maximum: 1
        review_threshold:
          type: number
          minimum: 0
          maximum: 1
        include:
          type: array
          items:
            $ref: "#/components/schemas/Fieldset"
      required: [plan]
    MatchedField:
      title: 命中字段
      description: 描述某次匹配命中的字段、关键词和值。
      type: object
      properties:
        field:
          type: string
        matched_keywords:
          type: array
          items:
            type: string
        value: {}
    PlanStandardMatch:
      title: 计划标准匹配结果
      description: 单个教学单元与一条课程标准之间的匹配结果、分数、理由和人工复核标记。
      type: object
      properties:
        code:
          type: string
        score:
          type: number
        match_type:
          type: string
          enum: [deterministic_field_overlap]
        matched_fields:
          type: array
          items:
            $ref: "#/components/schemas/MatchedField"
        rationale:
          type: string
        requires_human_review:
          type: boolean
        standard:
          $ref: "#/components/schemas/StandardPublic"
      required: [code, score, match_type, matched_fields, rationale, requires_human_review, standard]
    PlanMatchingResult:
      title: 计划匹配结果
      description: 整个教学计划按单元组织的标准匹配结果。
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/ParsedPlan"
        units:
          type: array
          items:
            type: object
            properties:
              unit_id:
                type: string
              unit_title:
                type: string
              matches:
                type: array
                items:
                  $ref: "#/components/schemas/PlanStandardMatch"
              warnings:
                type: array
                items:
                  type: string
        warnings:
          type: array
          items:
            type: string
    CoverageAnalyzeRequest:
      title: 覆盖分析请求
      description: 基于教学计划和可选匹配结果分析课程标准覆盖情况。
      allOf:
        - $ref: "#/components/schemas/PlanToStandardsRequest"
        - type: object
          properties:
            matches:
              $ref: "#/components/schemas/PlanMatchingResult"
    WeeklyScheduleRequest:
      title: 周进度请求
      description: 基于教学计划、匹配结果和周次配置生成确定性周进度。
      allOf:
        - $ref: "#/components/schemas/PlanToStandardsRequest"
        - type: object
          properties:
            matches:
              $ref: "#/components/schemas/PlanMatchingResult"
            teaching_weeks:
              type: integer
              minimum: 1
              maximum: 60
            lessons_per_week:
              type: integer
              minimum: 1
              maximum: 20
            review_weeks:
              type: array
              items:
                type: integer
            exam_weeks:
              type: array
              items:
                type: integer
